<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Genie — Systematic Technical Analysis</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--bd:#e3e8f0;--tx:#1a2233;--mut:#6b7688;
--good:#1a9e5c;--goodbg:#e6f7ee;--warn:#c8860a;--warnbg:#fdf4e3;--bad:#d83a34;--badbg:#fdeceb;
--neu:#5a6472;--neubg:#eef1f6;--acc:#2f6bff;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}
h1{font-size:24px;margin:0 0 4px}.sub{color:var(--mut);margin:0 0 22px;font-size:14px}
.searchbox{position:relative}
.row{display:flex;gap:8px}
#q{flex:1;padding:14px 16px;font-size:16px;border:2px solid var(--bd);border-radius:12px;background:#fff;outline:none}
#q:focus{border-color:var(--acc)}
#go{padding:0 22px;font-size:16px;font-weight:700;color:#fff;background:var(--acc);border:0;border-radius:12px;cursor:pointer}
#go:disabled{opacity:.5;cursor:default}
.drop{position:absolute;top:56px;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:12px;
box-shadow:0 12px 30px rgba(20,30,60,.12);z-index:20;overflow:hidden;display:none}
.opt{padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;gap:10px}
.opt:hover,.opt.active{background:#eef3ff}
.opt .sym{font-weight:700}.opt .nm{color:var(--mut);font-size:13px;text-align:right}
.hint{color:var(--mut);font-size:12.5px;margin:8px 2px 0}
.loading{text-align:center;color:var(--mut);padding:40px}
.spin{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;
animation:sp 0.8s linear infinite;margin:0 auto 10px}@keyframes sp{to{transform:rotate(360deg)}}
.verdict{border-radius:16px;padding:20px 22px;margin:22px 0 16px;border:1px solid var(--bd)}
.verdict.good{background:var(--goodbg);border-color:#bfe8d0}.verdict.warn{background:var(--warnbg);border-color:#f2dfb0}
.verdict.bad{background:var(--badbg);border-color:#f4c9c6}.verdict.neutral{background:var(--neubg)}
.badge{display:inline-block;font-size:20px;font-weight:800;letter-spacing:.2px}
.verdict.good .badge{color:var(--good)}.verdict.warn .badge{color:var(--warn)}
.verdict.bad .badge{color:var(--bad)}.verdict.neutral .badge{color:var(--neu)}
.conf{font-size:12px;color:var(--mut);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.headline{font-weight:700;margin:8px 0 4px;font-size:16px}.reason{color:#3a4353}
.meta{color:var(--mut);font-size:13px;margin-bottom:6px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 14px}
.card .lab{font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.good .dot,.dot.good{background:var(--good)}.warn .dot,.dot.warn{background:var(--warn)}
.bad .dot,.dot.bad{background:var(--bad)}.neutral .dot,.dot.neutral{background:var(--neu)}
.card .mn{color:var(--mut);font-size:13px;margin-top:3px}
.levels{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin:8px 0}
.levels h3{margin:0 0 12px;font-size:14px}
.lvrow{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px dashed var(--bd)}
.lvrow:last-child{border:0}.lvtag{width:120px;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.03em}
.lvval{font-weight:800;font-size:16px;min-width:90px}.lvdesc{color:var(--mut);font-size:13px}
details{margin-top:14px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:6px 14px}
summary{cursor:pointer;font-weight:600;padding:8px 0;color:var(--acc)}
.rule{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px}
.rule:last-child{border:0}.tag{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px}
.tag.buy{background:var(--goodbg);color:var(--good)}.tag.sell{background:var(--badbg);color:var(--bad)}
.tag.neutral{background:var(--neubg);color:var(--neu)}
.disc{color:var(--mut);font-size:12px;margin-top:18px;text-align:center;line-height:1.5}
.err{background:var(--badbg);border:1px solid #f4c9c6;color:var(--bad);padding:14px 16px;border-radius:12px;margin-top:18px}
@media(max-width:560px){.cards{grid-template-columns:1fr}.lvtag{width:88px}}
</style>
<!-- Analytics: GoatCounter. Replace genieanalysis with your code (e.g. geniestock). -->
<script data-goatcounter="https://genieanalysis.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body><div class="wrap">
<h1>🧞 Genie</h1>
<p class="sub">Systematic technical analysis for any NSE stock. Type a name or ticker, get a plain-English Buy / Hold / Sell read — no jargon.</p>

<div class="searchbox">
  <div class="row">
    <input id="q" autocomplete="off" placeholder="e.g. Mahindra, Reliance, TCS…" />
    <button id="go">Analyze</button>
  </div>
  <div id="drop" class="drop"></div>
</div>
<div class="hint">Tip: start typing a name or symbol and pick from the list. Data is end-of-day (NSE).</div>

<div id="out"></div>
</div>

<script>
const $q=document.getElementById('q'), $drop=document.getElementById('drop'),
      $go=document.getElementById('go'), $out=document.getElementById('out');
let items=[], active=-1, chosen=null, tmr=null;

function hideDrop(){$drop.style.display='none';active=-1;}
function renderDrop(){
  if(!items.length){hideDrop();return;}
  $drop.innerHTML=items.map((x,i)=>
    `<div class="opt${i===active?' active':''}" data-i="${i}">
       <span class="sym">${x.s}</span><span class="nm">${x.n}</span></div>`).join('');
  $drop.style.display='block';
  [...$drop.children].forEach(el=>el.onclick=()=>choose(+el.dataset.i));
}
function choose(i){chosen=items[i]; $q.value=items[i].s+' — '+items[i].n; hideDrop(); analyze();}

$q.addEventListener('input',()=>{
  chosen=null; const q=$q.value.trim();
  clearTimeout(tmr);
  if(q.length<1){hideDrop();return;}
  tmr=setTimeout(async()=>{
    try{ items=await (await fetch('/api/suggest?q='+encodeURIComponent(q))).json();
         active=-1; renderDrop(); }catch(e){hideDrop();}
  },120);
});
$q.addEventListener('keydown',e=>{
  if($drop.style.display==='block'&&items.length){
    if(e.key==='ArrowDown'){active=(active+1)%items.length;renderDrop();e.preventDefault();return;}
    if(e.key==='ArrowUp'){active=(active-1+items.length)%items.length;renderDrop();e.preventDefault();return;}
    if(e.key==='Enter'&&active>=0){choose(active);e.preventDefault();return;}
  }
  if(e.key==='Enter'){analyze();}
});
document.addEventListener('click',e=>{if(!$drop.contains(e.target)&&e.target!==$q)hideDrop();});
$go.onclick=analyze;

function symFromInput(){
  if(chosen) return chosen.s;
  const v=$q.value.trim();
  if(items.length&&(v.toUpperCase()===items[0].s||v.toLowerCase().includes(items[0].n.toLowerCase()))) return items[0].s;
  return v.split(' ')[0].toUpperCase(); // fall back to first token as ticker
}

function loadingMsg(msg){ $out.innerHTML=`<div class="loading"><div class="spin"></div>${msg}</div>`; }

async function fetchAnalyze(sym){
  const c=new AbortController(); const t=setTimeout(()=>c.abort(),95000);
  try{ const res=await fetch('/api/analyze?symbol='+encodeURIComponent(sym),{signal:c.signal});
       return await res.json(); }
  finally{ clearTimeout(t); }
}

async function analyze(){
  const sym=symFromInput(); if(!sym){return;}
  hideDrop(); $go.disabled=true;
  loadingMsg(`Reading the charts for <b>${sym}</b>… (first load can take a few seconds)`);
  let r=null;
  for(let attempt=1; attempt<=3; attempt++){
    try{ r=await fetchAnalyze(sym); break; }
    catch(e){
      if(attempt<3){ loadingMsg(`Server is waking up — retrying <b>${sym}</b> (${attempt}/2)…`);
                     await new Promise(s=>setTimeout(s,4000)); }
    }
  }
  if(r){
    render(r);
    if(r.ok && window.goatcounter && window.goatcounter.count){
      window.goatcounter.count({path:'analyze/'+r.symbol, title:'Analyze '+(r.name||r.symbol), event:true});
    }
  } else {
    $out.innerHTML=`<div class="err">The server is waking up or busy. Please wait ~30 seconds and click Analyze again.</div>`;
  }
  $go.disabled=false;
}

function render(r){
  if(!r.ok){ $out.innerHTML=`<div class="err">⚠️ ${r.error||'Could not analyze.'}</div>`; return; }
  const v=r.verdict, L=r.levels;
  const cards=r.cards.map(c=>
    `<div class="card ${c.tone}"><div class="lab"><span class="dot ${c.tone}"></span>${c.label}</div>
     <div class="mn">${c.meaning}</div></div>`).join('');
  const rules=r.rules.length ? r.rules.map(x=>
    `<div class="rule"><span>${x.id} · ${x.name}</span><span class="tag ${x.signal}">${x.signal.toUpperCase()}</span></div>`).join('')
    : '<div class="mn">No individual signals firing today.</div>';
  $out.innerHTML=`
    <div class="verdict ${v.tone}">
      <div><span class="badge">${v.action}</span><span class="conf">confidence: ${v.confidence}</span></div>
      <div class="headline">${v.headline}</div>
      <div class="reason">${v.reason}</div>
    </div>
    <div class="meta"><b>${r.name||r.symbol}</b> (${r.symbol}) · ₹${r.price} · as of ${r.as_of}</div>
    <div class="cards">${cards}</div>
    <div class="levels"><h3>🧭 Simple price map</h3>
      <div class="lvrow"><span class="lvtag">Buy above</span><span class="lvval good">₹${L.buy_above}</span>
        <span class="lvdesc">a confirmed move over this = strength returning</span></div>
      <div class="lvrow"><span class="lvtag">Now</span><span class="lvval">₹${L.price}</span>
        <span class="lvdesc">current price</span></div>
      <div class="lvrow"><span class="lvtag">Support</span><span class="lvval">₹${L.support}</span>
        <span class="lvdesc">first floor it should hold</span></div>
      <div class="lvrow"><span class="lvtag">Get out below</span><span class="lvval bad">₹${L.stop_below}</span>
        <span class="lvdesc">breaking this = thesis is wrong, exit</span></div>
      <div class="lvrow"><span class="lvtag">Overhead</span><span class="lvval">₹${L.resistance}</span>
        <span class="lvdesc">bigger ceiling further up</span></div>
    </div>
    <details><summary>See the technical signals behind this (${r.rules.length})</summary>${rules}</details>
    <div class="disc">${r.disclaimer}</div>`;
}
</script>
</body></html>
